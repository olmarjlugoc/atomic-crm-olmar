<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"
        />
        <meta name="theme-color" content="#000000" />
        <link rel="manifest" href="./manifest.json" />
        <link rel="shortcut icon" href="./favicon.ico" />
        <title>Atomic CRM</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }

            .loader-container {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
                background-color: #fafafa;
            }

            /* CSS Spinner from https://projects.lukehaas.me/css-loaders/ */

            .loader,
            .loader:before,
            .loader:after {
                border-radius: 50%;
            }

            .loader {
                color: #283593;
                font-size: 11px;
                text-indent: -99999em;
                margin: 55px auto;
                position: relative;
                width: 10em;
                height: 10em;
                box-shadow: inset 0 0 0 1em;
                -webkit-transform: translateZ(0);
                -ms-transform: translateZ(0);
                transform: translateZ(0);
            }

            .loader:before,
            .loader:after {
                position: absolute;
                content: '';
            }

            .loader:before {
                width: 5.2em;
                height: 10.2em;
                background: #fafafa;
                border-radius: 10.2em 0 0 10.2em;
                top: -0.1em;
                left: -0.1em;
                -webkit-transform-origin: 5.2em 5.1em;
                transform-origin: 5.2em 5.1em;
                -webkit-animation: load2 2s infinite ease 1.5s;
                animation: load2 2s infinite ease 1.5s;
            }

            .loader:after {
                width: 5.2em;
                height: 10.2em;
                background: #fafafa;
                border-radius: 0 10.2em 10.2em 0;
                top: -0.1em;
                left: 5.1em;
                -webkit-transform-origin: 0px 5.1em;
                transform-origin: 0px 5.1em;
                -webkit-animation: load2 2s infinite ease;
                animation: load2 2s infinite ease;
            }

            @-webkit-keyframes load2 {
                0% {
                    -webkit-transform: rotate(0deg);
                    transform: rotate(0deg);
                }
                100% {
                    -webkit-transform: rotate(360deg);
                    transform: rotate(360deg);
                }
            }

            @keyframes load2 {
                0% {
                    -webkit-transform: rotate(0deg);
                    transform: rotate(0deg);
                }
                100% {
                    -webkit-transform: rotate(360deg);
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>

    <body>
        <noscript> You need to enable JavaScript to run this app. </noscript>
        <div id="root">
            <div class="loader-container">
                <div class="loader">Loading...</div>
            </div>
        </div>
    </body>
<script>
  const getParams = () => {
    // 1) hash params (ej: #access_token=...&refresh_token=...&type=recovery)
    const hashParams = new URLSearchParams(window.location.hash.substring(1));

    // 2) query params (ej: ?code=... o ?token=...&type=recovery)
    const queryParams = new URLSearchParams(window.location.search);

    const access_token = hashParams.get("access_token") || queryParams.get("access_token");
    const refresh_token = hashParams.get("refresh_token") || queryParams.get("refresh_token");

    // Supabase a veces manda type en query, a veces en hash
    const type = hashParams.get("type") || queryParams.get("type");

    // Code exchange flow (muy común en recovery/invite dependiendo configuración)
    const code = queryParams.get("code");

    return { access_token, refresh_token, type, code };
  };

  function interceptAuthCallback() {
    const { access_token, refresh_token, type, code } = getParams();

    // ✅ Si es recovery: manda a la pantalla donde el usuario define la contraseña
    if (type === "recovery") {
      // Pasa tokens si vienen, o el code si viene
      const qs = new URLSearchParams();
      if (access_token) qs.set("access_token", access_token);
      if (refresh_token) qs.set("refresh_token", refresh_token);
      if (code) qs.set("code", code);
      qs.set("type", "recovery");

      window.location.href = `./#/reset-password?${qs.toString()}`;
      return;
    }

    // ✅ Flujo normal: manda al handler existente
    const qs = new URLSearchParams();
    if (access_token) qs.set("access_token", access_token);
    if (refresh_token) qs.set("refresh_token", refresh_token);
    if (code) qs.set("code", code);
    if (type) qs.set("type", type);

    window.location.href = `./#/auth-callback?${qs.toString()}`;
  }

  interceptAuthCallback();
</script>
</html>
